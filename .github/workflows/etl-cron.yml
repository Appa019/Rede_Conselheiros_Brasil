name: Monthly ETL Update

on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of each month at 6 AM UTC
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Lint and smoke test
        run: |
          cd backend
          ruff check .
          python -m pytest tests/test_etl_smoke.py -v -m smoke --tb=short

      - name: Run ETL pipeline
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        run: |
          cd backend
          python scripts/run_etl.py --verbose

      - name: Compute metrics
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        run: |
          cd backend
          python scripts/compute_metrics.py --verbose

      - name: Train ML models
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        run: |
          cd backend
          python scripts/train_model.py --skip-pinecone --verbose

      - name: Upload ML artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-models
          path: backend/data/models/
          retention-days: 30
